<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIGCAT 🎵 Jukebox</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F5F0E8;
    --cream2: #EDE8DC;
    --red: #E63329;
    --yellow: #F5C842;
    --green: #4CAF50;
    --blue: #4A90D9;
    --orange: #F07B39;
    --dark: #2C2416;

    /* 교사유형 5가지 색상 (오방색 기반) */
    --sj: #E63329;   /* 빨강 - 예쁨주의 */
    --ep: #4CAF50;   /* 초록 - 유머형 */
    --if: #F5C842;   /* 노랑 - 소심열정 */
    --fn: #4A90D9;   /* 파랑 - 공감형 */
    --tj: #2C2416;   /* 검정 - 교육주의 */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    font-family: 'Nunito', sans-serif;
    color: var(--dark);
    min-height: 100vh;
    background-image: radial-gradient(circle at 20% 20%, rgba(230,51,41,0.06) 0%, transparent 50%),
                      radial-gradient(circle at 80% 80%, rgba(74,144,217,0.06) 0%, transparent 50%),
                      radial-gradient(circle at 50% 50%, rgba(245,200,66,0.04) 0%, transparent 70%);
  }

  /* ─── HEADER ─── */
  header {
    text-align: center;
    padding: 48px 20px 32px;
    position: relative;
  }

  .logo-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .logo-tile {
    width: 52px; height: 52px;
    background: white;
    border-radius: 14px;
    border: 3px solid var(--dark);
    box-shadow: 3px 3px 0 var(--dark);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fredoka One', cursive;
    font-size: 22px;
    color: var(--red);
    animation: tileIn 0.5s ease both;
  }

  .logo-tile:nth-child(1) { animation-delay: 0.05s; }
  .logo-tile:nth-child(2) { animation-delay: 0.1s; }
  .logo-tile:nth-child(3) { animation-delay: 0.15s; }
  .logo-tile:nth-child(4) { animation-delay: 0.2s; }
  .logo-tile:nth-child(5) { animation-delay: 0.25s; }

  @keyframes tileIn {
    from { opacity: 0; transform: translateY(-16px) rotate(-5deg); }
    to   { opacity: 1; transform: translateY(0) rotate(0); }
  }

  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(32px, 7vw, 56px);
    color: var(--red);
    line-height: 1.1;
    letter-spacing: -1px;
    text-shadow: 3px 3px 0 rgba(230,51,41,0.18);
    animation: fadeUp 0.6s 0.3s ease both;
  }

  .subtitle {
    font-size: 15px;
    color: #888;
    margin-top: 8px;
    font-weight: 600;
    animation: fadeUp 0.6s 0.4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ─── TYPE FILTER BADGES ─── */
  .filter-section {
    padding: 0 20px 20px;
    max-width: 900px;
    margin: 0 auto;
    animation: fadeUp 0.6s 0.5s ease both;
  }

  .filter-label {
    font-size: 12px;
    font-weight: 800;
    color: #aaa;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .badge-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 12px;
  }

  .badge {
    padding: 8px 16px;
    border-radius: 50px;
    border: 2.5px solid var(--dark);
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    background: white;
    color: var(--dark);
    transition: all 0.15s;
    box-shadow: 2px 2px 0 var(--dark);
    user-select: none;
  }

  .badge:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--dark); }
  .badge:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--dark); }

  .badge.active { color: white; }
  .badge[data-type="ALL"].active  { background: var(--dark); }
  .badge[data-type="SJ"].active   { background: var(--sj); border-color: var(--sj); }
  .badge[data-type="EP"].active   { background: var(--ep); border-color: var(--ep); }
  .badge[data-type="IF"].active   { background: var(--if); border-color: var(--if); color: var(--dark); }
  .badge[data-type="FN"].active   { background: var(--fn); border-color: var(--fn); }
  .badge[data-type="TJ"].active   { background: var(--tj); border-color: var(--tj); }

  .badge[data-step].active { background: var(--dark); color: white; }

  /* ─── SONG GRID ─── */
  .grid-wrap {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 20px 80px;
  }

  .section-title {
    font-family: 'Fredoka One', cursive;
    font-size: 20px;
    color: var(--dark);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .song-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }

  .song-card {
    background: white;
    border-radius: 20px;
    border: 2.5px solid var(--dark);
    box-shadow: 4px 4px 0 var(--dark);
    padding: 20px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
    animation: cardIn 0.4s ease both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: scale(0.95) translateY(8px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .song-card:hover {
    transform: translate(-2px,-3px);
    box-shadow: 6px 7px 0 var(--dark);
  }

  .song-card:active {
    transform: translate(1px,1px);
    box-shadow: 2px 2px 0 var(--dark);
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }

  .type-dot {
    width: 36px; height: 36px;
    border-radius: 10px;
    border: 2px solid var(--dark);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fredoka One', cursive;
    font-size: 13px;
    color: white;
    flex-shrink: 0;
  }

  .type-dot.SJ { background: var(--sj); }
  .type-dot.EP { background: var(--ep); }
  .type-dot.IF { background: var(--if); color: var(--dark); }
  .type-dot.FN { background: var(--fn); }
  .type-dot.TJ { background: var(--tj); }

  .step-tag {
    font-size: 11px;
    font-weight: 800;
    padding: 4px 10px;
    border-radius: 50px;
    border: 2px solid var(--dark);
    background: var(--cream2);
    color: var(--dark);
    letter-spacing: 0.5px;
  }

  .card-title {
    font-family: 'Fredoka One', cursive;
    font-size: 18px;
    color: var(--dark);
    margin-bottom: 6px;
    line-height: 1.2;
  }

  .card-meta {
    font-size: 12px;
    color: #aaa;
    font-weight: 700;
  }

  .card-play-btn {
    margin-top: 14px;
    width: 100%;
    padding: 10px;
    border-radius: 12px;
    border: 2px solid var(--dark);
    background: var(--cream);
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 2px 2px 0 var(--dark);
  }

  .card-play-btn:hover { background: var(--dark); color: white; }

  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: #bbb;
  }

  .empty-state .big { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 15px; font-weight: 700; }

  /* ─── MODAL ─── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(44,36,22,0.5);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: white;
    border-radius: 28px;
    border: 3px solid var(--dark);
    box-shadow: 8px 8px 0 var(--dark);
    max-width: 480px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    animation: modalIn 0.3s ease both;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.92) translateY(20px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    padding: 24px 24px 16px;
    border-bottom: 2px solid var(--cream2);
    position: sticky; top: 0;
    background: white;
    border-radius: 28px 28px 0 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .modal-title {
    font-family: 'Fredoka One', cursive;
    font-size: 24px;
    color: var(--dark);
    flex: 1;
    margin-right: 12px;
  }

  .modal-close {
    width: 36px; height: 36px;
    border-radius: 10px;
    border: 2px solid var(--dark);
    background: var(--cream);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 2px 2px 0 var(--dark);
    transition: all 0.15s;
  }

  .modal-close:hover { background: var(--dark); color: white; }

  .modal-body { padding: 20px 24px 24px; }

  .modal-tags {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 18px;
  }

  .modal-section-label {
    font-size: 11px;
    font-weight: 800;
    color: #aaa;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
    margin-top: 18px;
  }

  .lyrics-box {
    background: var(--cream);
    border-radius: 14px;
    border: 2px solid var(--cream2);
    padding: 16px;
  }

  .lyric-line {
    font-size: 15px;
    font-weight: 700;
    color: var(--dark);
    padding: 5px 0;
    border-bottom: 1px dashed var(--cream2);
    line-height: 1.5;
  }

  .lyric-line:last-child { border-bottom: none; }

  .tpr-list {
    display: flex; flex-wrap: wrap; gap: 8px;
  }

  .tpr-chip {
    padding: 6px 14px;
    border-radius: 50px;
    background: var(--cream);
    border: 2px solid var(--cream2);
    font-size: 13px;
    font-weight: 700;
    color: var(--dark);
  }

  .modal-player {
    margin-top: 20px;
    background: var(--cream);
    border-radius: 16px;
    padding: 16px;
    border: 2px solid var(--cream2);
  }

  .player-info {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }

  .player-icon {
    width: 44px; height: 44px;
    border-radius: 12px;
    border: 2.5px solid var(--dark);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .player-meta { flex: 1; }
  .player-meta .name { font-size: 14px; font-weight: 800; color: var(--dark); }
  .player-meta .bpm  { font-size: 12px; color: #aaa; font-weight: 700; }

  audio { width: 100%; border-radius: 8px; }

  .no-audio {
    text-align: center;
    color: #bbb;
    font-size: 13px;
    font-weight: 700;
    padding: 8px;
  }

  /* ─── FLOATING ADMIN BTN ─── */
  .fab {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--dark);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 14px 20px;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 4px 4px 0 rgba(0,0,0,0.3);
    transition: all 0.15s;
    font-family: 'Nunito', sans-serif;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .fab:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 rgba(0,0,0,0.3); }

  /* ─── LOADING ─── */
  .loading {
    text-align: center;
    padding: 60px;
    font-family: 'Fredoka One', cursive;
    font-size: 20px;
    color: #ccc;
  }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 480px) {
    header { padding: 32px 16px 20px; }
    .filter-section { padding: 0 16px 16px; }
    .grid-wrap { padding: 0 16px 80px; }
    .logo-tile { width: 42px; height: 42px; font-size: 18px; }
  }
</style>
</head>

async function loadTracks() {
  // 1) tracks.json fetch 시도 (GitHub Pages에서 작동)
  try {
    const res = await fetch('tracks.json');
    if (res.ok) {
      const data = await res.json();
      if (Array.isArray(data) && data.length > 0) {
        allTracks = data;
        render();
        return;
      }
    }
  } catch(e) {}
  // 2) fetch 실패 시 인라인 데이터 사용 (로컬 파일 열기, CORS 오류 등)
  allTracks = INLINE_TRACKS;
  render();
}

// ─── 렌더링 ───
function render() {
  const filtered = allTracks.filter(t => {
    const typeOk = activeType === 'ALL' || t.type === activeType;
    const stepOk = activeStep === 'ALL' || t.step === activeStep;
    return typeOk && stepOk;
  });

  const grid = document.getElementById('songGrid');

  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="big">🎵</div>
        <p>해당하는 노래가 없어요<br>관리자 페이지에서 추가해보세요!</p>
      </div>`;
    return;
  }

  grid.innerHTML = filtered.map((t, i) => `
    <div class="song-card" onclick="openModal(${t.id})" style="animation-delay:${i*0.06}s">
      <div class="card-top">
        <div class="type-dot ${t.type}">${t.type}</div>
        <span class="step-tag">${t.step}</span>
      </div>
      <div class="card-title">${t.title}</div>
      <div class="card-meta">♩ ${t.bpm} BPM · ${t.mood}</div>
      <button class="card-play-btn" onclick="event.stopPropagation(); openModal(${t.id})">
        🎵 가사 + TPR 보기
      </button>
    </div>
  `).join('');
}

// ─── 필터 ───
document.getElementById('typeFilter').addEventListener('click', e => {
  const badge = e.target.closest('[data-type]');
  if (!badge) return;
  document.querySelectorAll('#typeFilter .badge').forEach(b => b.classList.remove('active'));
  badge.classList.add('active');
  activeType = badge.dataset.type;
  render();
});

document.getElementById('stepFilter').addEventListener('click', e => {
  const badge = e.target.closest('[data-step]');
  if (!badge) return;
  document.querySelectorAll('#stepFilter .badge').forEach(b => b.classList.remove('active'));
  badge.classList.add('active');
  activeStep = badge.dataset.step;
  render();
});

// ─── 모달 ───
function openModal(id) {
  const t = allTracks.find(x => x.id === id);
  if (!t) return;

  document.getElementById('modalTitle').textContent = t.title;

  const typeColors = { SJ:'#E63329', EP:'#4CAF50', IF:'#F5C842', FN:'#4A90D9', TJ:'#2C2416' };
  const col = typeColors[t.type] || '#2C2416';
  const textCol = t.type === 'IF' ? '#2C2416' : 'white';

  document.getElementById('modalBody').innerHTML = `
    <div class="modal-tags">
      <span class="badge" style="background:${col};color:${textCol};border-color:${col}">${t.type}</span>
      <span class="step-tag">${t.step}</span>
      <span class="step-tag">♩ ${t.bpm} BPM</span>
      <span class="step-tag">🎨 ${t.mood}</span>
    </div>

    <div class="modal-section-label">📝 가사 (Lyrics)</div>
    <div class="lyrics-box">
      ${(t.lyrics || []).map(l => `<div class="lyric-line">🎵 ${l}</div>`).join('')}
    </div>

    <div class="modal-section-label">💃 TPR 동작</div>
    <div class="tpr-list">
      ${(t.tpr || []).map(a => `<span class="tpr-chip">👉 ${a}</span>`).join('')}
    </div>

    <div class="modal-section-label">🎧 오디오 스타일</div>
    <div class="tpr-chip" style="display:inline-block">${t.audio_style || '—'}</div>

    <div class="modal-player">
      <div class="player-info">
        <div class="player-icon" style="background:${col}22;border-color:${col}">🎵</div>
        <div class="player-meta">
          <div class="name">${t.title}</div>
          <div class="bpm">${t.bpm} BPM · ${t.type} Type</div>
        </div>
      </div>
      ${t.audio_url
        ? `<audio controls src="${t.audio_url}"></audio>`
        : `<div class="no-audio">🎵 MP3를 추가하면 여기서 재생돼요</div>`
      }
    </div>
  `;

  document.getElementById('modalOverlay').classList.add('open');
}

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ─── 시작 ───
loadTracks();
</script>
